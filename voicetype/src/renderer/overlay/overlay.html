<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://flagcdn.com; font-src 'self' data:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; frame-src 'none'; form-action 'self';"
    />
    <title></title>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent !important;
        /* Firefox */
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar,
      #overlay-shell::-webkit-scrollbar,
      #voice-pill::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      body {
        visibility: hidden;
      }

      html.overlay-ready body {
        visibility: visible;
      }

      @keyframes pillSpin {
        to { transform: rotate(360deg); }
      }

      #overlay-shell {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        background: transparent;
        overflow: hidden;
        pointer-events: none;
      }

      html[data-anchor="top-center"] #overlay-shell {
        align-items: flex-start;
      }

      #voice-pill {
        -webkit-app-region: no-drag;
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        width: 36px;
        height: 8px;
        padding: 0;
        border-radius: 999px;
        background: #000000;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: none;
        user-select: none;
        transform-origin: center center;
        transition: width 140ms cubic-bezier(0.4, 0, 0.2, 1),
                    height 140ms cubic-bezier(0.4, 0, 0.2, 1),
                    padding 140ms cubic-bezier(0.4, 0, 0.2, 1),
                    border 140ms ease,
                    background 140ms ease;
      }

      #voice-pill[data-mode="wave"],
      #voice-pill[data-mode="processing"] {
        width: 80px;
        height: 28px;
        padding: 0 10px;
        border: 1.5px solid #ffffff;
      }

      #bars {
        position: relative;
        z-index: 1;
        display: none;
        align-items: center;
        justify-content: center;
        gap: 2px;
        height: 14px;
      }

      .voice-bar {
        width: 1.5px;
        height: 2px;
        border-radius: 999px;
        background: #ffffff;
        opacity: 0.3;
        box-shadow: none;
      }

      #spinner {
        position: relative;
        z-index: 1;
        display: none;
        animation: pillSpin 0.8s linear infinite;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
