<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://flagcdn.com; font-src 'self' data:; connect-src 'self' ws: wss:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-src 'none'; form-action 'self';"
    />
    <title>Echo</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        font-family: "Figtree", "Aptos", "Segoe UI Variable Display", "Segoe UI Variable Text", "SF Pro Display", "Helvetica Neue", sans-serif;
        background: hsl(220 20% 94%);
      }

      #root {
        height: 100%;
        background: hsl(220 20% 94%);
      }

      /* ── Splash screen ──
         Mirrors the app shell: neutral cool-gray surface (--app-bg),
         a floating white card (--background) echoing .theme-main-panel,
         and the brand indigo (--brand ≈ #6C66E8) used sparingly for the
         mark, waveform, and indeterminate progress bar.                 */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(60% 60% at 50% 30%, rgba(108, 102, 232, 0.10), transparent 70%),
          radial-gradient(70% 60% at 50% 100%, rgba(108, 102, 232, 0.05), transparent 60%),
          hsl(220 20% 94%);
        transition: opacity 0.4s ease, visibility 0.4s ease;
        opacity: 1;
        -webkit-font-smoothing: antialiased;
        -webkit-app-region: drag;
      }
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      #splash .splash-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 34px 52px 28px;
        background: #ffffff;
        border: 1px solid rgba(17, 17, 17, 0.06);
        border-radius: 18px;
        box-shadow:
          0 1px 2px rgba(17, 17, 17, 0.04),
          0 18px 48px -20px rgba(17, 17, 17, 0.18),
          0 30px 80px -40px rgba(108, 102, 232, 0.25);
        animation: splash-rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      #splash .splash-badge {
        position: relative;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        background:
          radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,0.18), transparent 55%),
          linear-gradient(160deg, hsl(244 76% 66%), hsl(244 72% 56%));
        box-shadow:
          0 1px 0 rgba(255,255,255,0.25) inset,
          0 0 0 1px rgba(108, 102, 232, 0.25),
          0 10px 24px -10px rgba(108, 102, 232, 0.55);
      }
      #splash .splash-badge::after {
        content: "";
        position: absolute;
        inset: -8px;
        border-radius: 22px;
        border: 1px solid rgba(108, 102, 232, 0.28);
        animation: splash-ripple 2s ease-out infinite;
        pointer-events: none;
      }
      #splash .splash-wave {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        height: 26px;
      }
      #splash .splash-wave span {
        display: block;
        width: 3px;
        height: 100%;
        border-radius: 999px;
        background: #ffffff;
        transform-origin: center;
        animation: splash-wave 1.1s ease-in-out infinite;
      }
      #splash .splash-wave span:nth-child(1) { animation-delay: -0.50s; }
      #splash .splash-wave span:nth-child(2) { animation-delay: -0.30s; }
      #splash .splash-wave span:nth-child(3) { animation-delay: -0.10s; }
      #splash .splash-wave span:nth-child(4) { animation-delay: -0.25s; }
      #splash .splash-wave span:nth-child(5) { animation-delay: -0.45s; }

      #splash .splash-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      #splash .splash-word {
        font-family: "Figtree", "Aptos", "Segoe UI Variable Display", "SF Pro Display", "Helvetica Neue", sans-serif;
        font-weight: 600;
        font-size: 20px;
        letter-spacing: -0.01em;
        color: hsl(222 20% 11%);
        line-height: 1;
      }
      #splash .splash-hint {
        font-family: "Figtree", "Aptos", "Segoe UI Variable Display", "SF Pro Display", "Helvetica Neue", sans-serif;
        font-weight: 500;
        font-size: 12px;
        color: rgba(17, 17, 17, 0.5);
        letter-spacing: 0.01em;
        line-height: 1;
      }
      #splash .splash-progress {
        position: relative;
        width: 180px;
        height: 3px;
        border-radius: 999px;
        background: rgba(17, 17, 17, 0.06);
        overflow: hidden;
      }
      #splash .splash-progress::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(108, 102, 232, 0) 0%,
          hsl(244 76% 62%) 50%,
          rgba(108, 102, 232, 0) 100%
        );
        animation: splash-slide 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes splash-wave {
        0%, 100% { transform: scaleY(0.25); opacity: 0.75; }
        50%      { transform: scaleY(1);    opacity: 1;    }
      }
      @keyframes splash-ripple {
        0%   { transform: scale(0.96); opacity: 0.55; }
        70%  { transform: scale(1.12); opacity: 0;    }
        100% { transform: scale(1.12); opacity: 0;    }
      }
      @keyframes splash-slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%);  }
      }
      @keyframes splash-rise {
        from { opacity: 0; transform: translateY(8px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0)   scale(1);    }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .splash-wave span,
        #splash .splash-badge::after,
        #splash .splash-progress::after,
        #splash .splash-card {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — visible instantly, hidden once React + fonts are ready -->
    <div id="splash" role="status" aria-label="Loading Echo">
      <div class="splash-card">
        <div class="splash-badge" aria-hidden="true">
          <div class="splash-wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="splash-text">
          <div class="splash-word">Echo</div>
          <div class="splash-hint">Warming up your voice…</div>
        </div>
        <div class="splash-progress" aria-hidden="true"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
