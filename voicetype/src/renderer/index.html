<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy is injected by the main process via
      `session.defaultSession.webRequest.onHeadersReceived` so we can use
      one strict policy in packaged builds and a Vite-HMR-friendly one in
      dev. Keeping it out of the meta tag avoids the historical pitfall
      where the dev policy ("ws: wss:") shipped to production unchanged.
      See `setupContentSecurityPolicy` in `src/main/index.ts`.
    -->
    <title>Echo</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        font-family: "Figtree", "Aptos", "Segoe UI Variable Display", "Segoe UI Variable Text", "SF Pro Display", "Helvetica Neue", sans-serif;
        background: hsl(195 53% 94%);
      }

      #root {
        height: 100%;
        background: hsl(195 53% 94%);
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Match the in-app shell so the splash hands off seamlessly:
             - pale icy-blue canvas (same as --app-bg / #E8F4F8)
             - subtle white highlight upper-right
             - faint deeper-blue glow lower-left for depth */
        background:
          radial-gradient(58% 42% at 14% 102%, rgba(120, 170, 200, 0.16), transparent 70%),
          radial-gradient(34% 36% at 86% 8%, rgba(255, 255, 255, 0.55), transparent 72%),
          linear-gradient(180deg, hsl(195 60% 96%) 0%, hsl(195 48% 92%) 100%);
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                    visibility 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 1;
        -webkit-font-smoothing: antialiased;
        -webkit-app-region: drag;
      }
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      /* Vertically centered column. No card chrome — the splash bleeds
         into the canvas so the React app fades into the same surface. */
      #splash .splash-stage {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 32px;
        animation: splash-fade 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      #splash .splash-mark {
        width: 140px;
        height: 140px;
        margin-bottom: 18px;
        filter: drop-shadow(0 28px 42px rgba(80, 92, 255, 0.18));
        pointer-events: none;
        animation: splash-text-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      #splash .splash-mark img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }

      #splash .splash-wordmark {
        position: relative;
        font-family: "Figtree", "Aptos", "Segoe UI Variable Display", "SF Pro Display", "Helvetica Neue", sans-serif;
        font-weight: 650;
        font-size: 30px;
        line-height: 1;
        letter-spacing: -0.04em;
        color: hsl(222 22% 12%);
        animation: splash-text-in 0.9s 0.08s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      #splash .splash-tagline {
        position: relative;
        margin-top: 10px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: hsl(220 9% 46%);
        animation: splash-text-in 0.9s 0.16s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Slim progress bar centered under the wordmark.
         - Hairline track on the canvas so it doesn't compete with the logo.
         - Fill uses the brand indigo with a faint moving sheen so it feels
           alive while the bar fills. */
      #splash .splash-progress {
        position: relative;
        margin-top: 36px;
        width: 220px;
        height: 4px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.06);
        overflow: hidden;
        animation: splash-text-in 0.9s 0.24s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      #splash .splash-progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 8%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          hsl(244 76% 64%) 0%,
          hsl(244 82% 72%) 100%
        );
        box-shadow: 0 0 12px rgba(108, 102, 232, 0.45);
        animation: splash-progress 5.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      #splash .splash-progress-fill::after {
        content: "";
        position: absolute;
        top: 0;
        right: -40px;
        width: 40px;
        height: 100%;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.55) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        animation: splash-shine 1.6s linear infinite;
      }

      #splash.is-complete .splash-progress-fill {
        animation: none;
        width: 100%;
        transition: width 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      }
      #splash.is-complete .splash-progress-fill::after {
        animation: none;
        opacity: 0;
      }

      @keyframes splash-progress {
        0%   { width: 8%;  }
        30%  { width: 42%; }
        62%  { width: 68%; }
        100% { width: 88%; }
      }
      @keyframes splash-shine {
        0%   { transform: translateX(-220px); }
        100% { transform: translateX(220px);  }
      }
      @keyframes splash-text-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0);   }
      }
      @keyframes splash-fade {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .splash-stage,
        #splash .splash-mark,
        #splash .splash-wordmark,
        #splash .splash-tagline,
        #splash .splash-progress,
        #splash .splash-progress-fill,
        #splash .splash-progress-fill::after {
          animation: none !important;
        }
        #splash .splash-progress-fill { width: 82%; }
        #splash.is-complete .splash-progress-fill { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — visible instantly, hidden once React + fonts are ready -->
    <div id="splash" role="status" aria-label="Loading Echo">
      <div class="splash-stage">
        <div class="splash-mark" aria-hidden="true">
          <img src="./assets/echo-logo.png" alt="" draggable="false" />
        </div>
        <div class="splash-wordmark">Echo</div>
        <div class="splash-tagline">Voice dictation, instantly</div>
        <div class="splash-progress" aria-hidden="true">
          <div class="splash-progress-fill"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
